<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- SEO & Meta -->
  <title>IZA Workout — Tu Entrenamiento Personal</title>
  <meta name="description" content="App personal de entrenamiento de fuerza y carrera. Registra tus pesos, reps y progreso.">
  <meta name="author" content="Iza">
  
  <!-- PWA Meta -->
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IZA Workout">
  <link rel="manifest" href="./manifest.json">
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  
  <!-- Styles -->
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
</head>
<body>

  <div id="app">
    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- HOME -->
      <div id="page-home" class="page-view active">
        <!-- Rendered by App.renderHome() -->
        <div class="flex items-center justify-center" style="min-height: 60vh;">
          <div class="anim-pulse text-secondary">Cargando...</div>
        </div>
      </div>

      <!-- WORKOUT -->
      <div id="page-workout" class="page-view">
        <!-- Rendered by Workout.render() -->
      </div>

      <!-- ENTRENOS -->
      <div id="page-entrenos" class="page-view">
        <!-- Rendered by Plans.render() -->
      </div>

      <!-- CALENDAR -->
      <div id="page-calendar" class="page-view">
        <!-- Rendered by Calendar.render() -->
      </div>

      <!-- PROGRESS -->
      <div id="page-progress" class="page-view">
        <!-- Rendered by Progress.render() -->
      </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="nav-bottom" id="nav-bottom" role="navigation" aria-label="Navegación principal">
      <button class="nav-item active" data-page="home" onclick="App.navigate('home')" aria-label="Inicio" id="nav-home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Inicio</span>
      </button>

      <button class="nav-item" data-page="entrenos" onclick="App.navigate('entrenos')" aria-label="Entrenos" id="nav-entrenos">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Entrenos</span>
      </button>

      <button class="nav-item" data-page="calendar" onclick="App.navigate('calendar')" aria-label="Calendario" id="nav-calendar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Calendario</span>
      </button>

      <button class="nav-item" data-page="progress" onclick="App.navigate('progress')" aria-label="Progreso" id="nav-progress">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>Progreso</span>
      </button>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="./js/utils.js"></script>
  <script src="./js/data.js"></script>
  <script src="./js/plans-extra.js"></script>
  <script src="./js/express.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/calendar.js"></script>
  <script src="./js/tracker.js"></script>
  <script src="./js/workout.js"></script>
  <script src="./js/progress.js"></script>
  <script src="./js/running.js"></script>
  <script src="./js/plans.js"></script>
  <script src="./js/app.js"></script>

</body>
</html>
